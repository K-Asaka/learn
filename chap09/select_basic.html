<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>入力ボックス／選択ボックスの値を取得する</title>
</head>
<body>
	<form>
		<div>
			<label for="food">好きな食べ物は？：</label>
			<select id="food">
				<option value="ラーメン">ラーメン</option>
				<option value="餃子">餃子</option>
				<option value="焼き肉">焼き肉</option>
			</select>
			<input id="btn" type="button" value="送信" />
		</div>
	</form>

	<script src="scripts/select_basic.js"></script>
	<noscript>JavaScriptが利用できません。</noscript>
</body>
</html>
