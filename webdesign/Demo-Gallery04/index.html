<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>マルチカラムでレイアウトを作成する</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/destyle.css@1.0.5/destyle.css">
    <link rel="stylesheet" href="./style.css" type="text/css">
</head>
<body>
    <main class="grid">
        <a href="../img/img1-1600.jpg" data-aos="fade-up">
            <img class="grid-item"
                src="../img/img1-400.jpg"
                srcset="../img/img1-400.jpg 400w,
                        ../img/img1-800.jpg 800w"
                alt="Sainte Chapelle">
        </a>
        <a href="../img/img2-1600.jpg" data-aos="fade-up">
            <img class="grid-item"
                src="../img/img2-400.jpg"
                srcset="../img/img2-400.jpg 400w,
                        ../img/img2-800.jpg 800w"
                alt="Fushimi Inari Shrine">
        </a>
    </main>
</body>
</html>
