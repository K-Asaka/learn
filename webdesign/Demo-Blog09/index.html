<!DOCTYPE html>

    <link rel="stylesheet" href="./style.css" type="text/css">
</head>
<body>
    <article>
        <blockquote>
            <p>
                リラックスしているときの猫の目はとってもおだやか。

            </p>
        </blockquote>
    </article>
