<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>画像とテキストを互い違いに表示させる</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./style.css" type="text/css">
</head>
<body>
    <section class="brown-bg">
        <div class="wrapper content flex-reverse">
            <div class="home-text">
                <h2 class="title">Webデザイナーの活躍する職場です</h2>
                <p>
                    制作チームではWebデザイナーが一番多く在籍しています。
                    ただ機能する制作物を作るのではなく、使い勝手がよく美しいものを生み出していきます。
                    あなたも、誰かの世界が変わるようなクリエイティブなWebサイトを世界中に広めませんか？
                </p>
            </div>
            <div class="home-chart">
                <div class="pie-chart"></div>
            </div>
        </div>
    </section>

    <section class="wrapper content">
        <div class="home-text">
            <h2 class="title">あなたの生活にあわせたスタイルで働けます</h2>
            <p>
                弊社では東京、大阪のオフィスの他、リモート勤務も可能です。
                リモート勤務で活躍している社員は全体の3分の1となり、年々増加しています。
                自宅やコワーキングスペースなど、あなたの一番集中できる場所で仕事に取り組んでください。
            </p>
        </div>
        <div class="home-chart">
            <div class="bar-chart"></div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/chartist.js/latest/chartist.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
