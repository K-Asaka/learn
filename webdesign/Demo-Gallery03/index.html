<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>画像をレスポンシブに対応させる</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/destyle.css@1.0.5/destyle.css">
    <link rel="stylesheet" href="./style.css" type="text/css">
</head>
<body>
    <img src="../img/800.png"
    srcset="../img/400.png 400w,
            ../img/800.png 800w,
            ../img/1200.png 1200w"
    sizes="(min-width: 800px) 800px, 100vw"
    alt="デモ画像">

    <img class="grid-item"
        src="../img/img1-400.jpg"
        srcset="../img/img1-400.jpg 400w,
                ../img/img1-800.jpg 800w"
        alt="Sainte Chapelle">
</body>
</html>
