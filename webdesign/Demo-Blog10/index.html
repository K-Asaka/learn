<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>各要素を装飾する(引用文・ページ送り・囲み枠)</title>
    <link rel="stylesheet" href="./style.css" type="text/css">
</head>
<body>
    <article>
        <blockquote>
            <p>
                「天は人の上に人を造らず人の下に人を造らず」と言えり。
                されば天より人を生ずるには、万人は万人みな同じ位にして、生まれながら貴賤上下の差別なく、万物の霊たる身と心との働きをもって天地の間にあるよろずのものを資り、もって衣食住の用を達し、自由自在、互いに人の妨げをなさずしておのおの安楽にこの世を渡らしめ給うの趣意なり。
            </p>
        </blockquote>
    </article>
</body>
</html>
