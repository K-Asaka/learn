<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>タイムラインを表示する</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./style.css" type="text/css">
</head>
<body>
    <ol class="timeline">
        <li class="timeline-item">
            <h3 class="timeline-title">お申し込み</h3>
            <p class="timeline-content icon-file">
                応募フォームより必要事項を記入してお申し込みください。ファイルの添付はできません。
            </p>
        </li>
        <li class="timeline-item">
            <h3 class="timeline-title">スキルテスト</h3>
            <p class="timeline-content icon-code">
                HTML/CSSのコーディングについてスキルテストを行います。(所要時間60分)
            </p>
        </li>
        <li class="timeline-item">
            <h3 class="timeline-title">面談</h3>
            <p class="timeline-content icon-chat">
                スキルテストに合格した人はビデオ通話にて30分程度の面談を行います。日程は相談可能です。
            </p>
        </li>
        <li class="timeline-item">
            <h3 class="timeline-title">採用</h3>
            <p class="timeline-content icon-hands">
                採用となった方は契約完了後、ご希望の勤務地により業務がスタートします。一緒に素敵なWebサイトを作りましょう！
            </p>
        </li>
    </ol>
</body>
</html>
